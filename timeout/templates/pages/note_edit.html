{% extends "base.html" %}
{% load static %}
{% block title %}Edit Note - Timeout{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/notes-styles.css' %}">
{% endblock %}

{% block content %}
<div class="container mt-4 notes-page">
    <div class="row">
        <div class="col-lg-8 mx-auto">

            <div class="notes-header">
                <h2>Edit Note</h2>
                <a href="{% url 'notes' %}" class="btn btn-neptune-outline">← Back to Notes</a>
            </div>

            <div class="notes-create-card">
                <div class="card-body">
                    <form method="post" action="{% url 'note_edit' note.id %}">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label">Title</label>
                            {{ form.title }}
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Content</label>
                            {{ form.content }}
                        </div>
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">Category</label>
                                {{ form.category }}
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Link to Event</label>
                                {{ form.event }}
                            </div>
                        </div>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-neptune">Save Changes</button>
                            <a href="{% url 'notes' %}" class="btn btn-neptune-outline">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </div>
</div>
{% endblock %}
